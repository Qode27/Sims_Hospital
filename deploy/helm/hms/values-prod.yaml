global:
  environment: prod

namespaceOverride: hms-prod

frontend:
  replicaCount: 2
  image:
    tag: latest-prod
  resources:
    requests:
      cpu: 150m
      memory: 192Mi
    limits:
      cpu: 400m
      memory: 384Mi

backend:
  replicaCount: 2
  image:
    tag: latest-prod
  config:
    databaseUrl: file:/app/data/sims-prod.db
    corsOrigin: https://hms.kansalt.com
  persistence:
    data:
      size: 10Gi
    uploads:
      size: 20Gi
    logs:
      size: 5Gi
  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1024Mi

ingress:
  hosts:
    - host: hms.kansalt.com
      frontendPaths:
        - path: /
          pathType: Prefix
      backendPaths:
        - path: /api
          pathType: Prefix
        - path: /uploads
          pathType: Prefix
  tls: []

podDisruptionBudget:
  enabled: true
  minAvailable: 1
