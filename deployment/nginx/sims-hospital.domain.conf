server {
    listen 80;
    listen [::]:80;
    server_name __SIMS_SERVER_NAME__;

    client_max_body_size 10M;

    location = / {
        return 302 https://__SIMS_CANONICAL_HOST____SIMS_BASE_PATH__;
    }

    location = __SIMS_BASE_PREFIX__ {
        return 302 https://__SIMS_CANONICAL_HOST____SIMS_BASE_PATH__;
    }

    location __SIMS_BASE_PATH__api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location __SIMS_BASE_PATH__uploads/ {
        proxy_pass http://127.0.0.1:4000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location __SIMS_BASE_PATH__ {
        rewrite ^__SIMS_BASE_PATH__(.*)$ /$1 break;
        root /var/www/sims-hospital/frontend/dist;
        try_files $uri $uri/ /index.html;
    }
}
