apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hms.backendName" . }}
  namespace: {{ include "hms.namespace" . }}
  labels:
    {{- include "hms.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "hms.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "hms.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      initContainers:
        - name: migrate
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            - sh
            - -c
            - npx prisma migrate deploy --schema prisma/schema.prisma
          envFrom:
            - configMapRef:
                name: {{ include "hms.backendName" . }}-config
            - secretRef:
                name: {{ .Values.backend.existingSecret }}
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: uploads
              mountPath: /app/uploads
            - name: logs
              mountPath: /app/logs
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.service.targetPort }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "hms.backendName" . }}-config
            - secretRef:
                name: {{ .Values.backend.existingSecret }}
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: uploads
              mountPath: /app/uploads
            - name: logs
              mountPath: /app/logs
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.backend.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.backend.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.backend.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.backend.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.readinessProbe.periodSeconds }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "hms.backendName" . }}-data
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ include "hms.backendName" . }}-uploads
        - name: logs
          persistentVolumeClaim:
            claimName: {{ include "hms.backendName" . }}-logs
