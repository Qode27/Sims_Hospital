{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.name }}
  namespace: {{ include "hms.namespace" . }}
  labels:
    {{- include "hms.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ required "secrets.data.JWT_SECRET is required when secrets.create=true" .Values.secrets.data.JWT_SECRET | quote }}
{{- end }}
