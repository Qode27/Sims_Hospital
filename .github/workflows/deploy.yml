name: Build And Deploy Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: azure-appservice-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npm run prisma:generate

      - name: Build frontend into backend public
        working-directory: frontend
        run: npm run build:backend-public

      - name: Build backend
        working-directory: backend
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
        run: npm run build

      - name: Prune backend dev dependencies
        working-directory: backend
        run: npm prune --omit=dev

      - name: Package monolith artifact
        run: npm run package:monolith

      - name: Archive deployment package
        working-directory: app/dist
        run: zip -r ../sims-monolith-${{ github.sha }}.zip .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sims-monolith-${{ github.sha }}
          path: app/sims-monolith-${{ github.sha }}.zip
          retention-days: 14

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: app/sims-monolith-${{ github.sha }}.zip
