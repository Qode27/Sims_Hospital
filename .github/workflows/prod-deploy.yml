name: Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
      backend_image: ${{ steps.meta.outputs.backend_image }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        env:
          JWT_SECRET: ci-prod-secret
        run: npm test

      - name: Build backend
        working-directory: backend
        env:
          JWT_SECRET: ci-prod-secret
        run: npm run build

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Compute image metadata
        id: meta
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/sims-hospital-frontend" >> "$GITHUB_OUTPUT"
          echo "backend_image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/sims-hospital-backend" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/backend.Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}:prod-${{ steps.meta.outputs.short_sha }}
            ${{ steps.meta.outputs.backend_image }}:latest-prod

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/frontend.Dockerfile
          push: true
          build-args: |
            VITE_APP_BASE_PATH=/
          tags: |
            ${{ steps.meta.outputs.frontend_image }}:prod-${{ steps.meta.outputs.short_sha }}
            ${{ steps.meta.outputs.frontend_image }}:latest-prod

  deploy-prod:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_VPS }}" | base64 -d > ~/.kube/config

      - name: Ensure namespace
        run: kubectl apply -f deploy/k8s/namespaces/hms-prod.yaml

      - name: Create registry pull secret
        run: |
          kubectl -n hms-prod create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username="${{ secrets.GHCR_PULL_USERNAME }}" \
            --docker-password="${{ secrets.GHCR_PULL_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create backend secret
        run: |
          kubectl -n hms-prod create secret generic hms-backend-secrets \
            --from-literal=JWT_SECRET="${{ secrets.HMS_PROD_JWT_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy production release
        run: |
          helm upgrade --install hms-prod deploy/helm/hms \
            --namespace hms-prod \
            --values deploy/helm/hms/values.yaml \
            --values deploy/helm/hms/values-prod.yaml \
            --set imagePullSecrets[0].name=ghcr-pull-secret \
            --set frontend.image.repository=${{ needs.build-and-push.outputs.frontend_image }} \
            --set frontend.image.tag=prod-${{ needs.build-and-push.outputs.short_sha }} \
            --set backend.image.repository=${{ needs.build-and-push.outputs.backend_image }} \
            --set backend.image.tag=prod-${{ needs.build-and-push.outputs.short_sha }}

      - name: Wait for production rollout
        run: |
          kubectl -n hms-prod rollout status deployment/hms-prod-frontend --timeout=300s
          kubectl -n hms-prod rollout status deployment/hms-prod-backend --timeout=300s
