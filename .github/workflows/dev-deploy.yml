name: Dev and Test Deploy

on:
  push:
    branches:
      - dev
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
      backend_image: ${{ steps.meta.outputs.backend_image }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        env:
          JWT_SECRET: ci-dev-secret
        run: npm test

      - name: Build backend
        working-directory: backend
        env:
          JWT_SECRET: ci-dev-secret
        run: npm run build

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_APP_BASE_PATH: /sims/
        run: npm run build

      - name: Compute image metadata
        id: meta
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/sims-hospital-frontend" >> "$GITHUB_OUTPUT"
          echo "backend_image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/sims-hospital-backend" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/backend.Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}:dev-${{ steps.meta.outputs.short_sha }}
            ${{ steps.meta.outputs.backend_image }}:latest-dev
            ${{ steps.meta.outputs.backend_image }}:test-${{ steps.meta.outputs.short_sha }}
            ${{ steps.meta.outputs.backend_image }}:latest-test

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/frontend.Dockerfile
          push: true
          build-args: |
            VITE_APP_BASE_PATH=/sims/
          tags: |
            ${{ steps.meta.outputs.frontend_image }}:dev-${{ steps.meta.outputs.short_sha }}
            ${{ steps.meta.outputs.frontend_image }}:latest-dev
            ${{ steps.meta.outputs.frontend_image }}:test-${{ steps.meta.outputs.short_sha }}
            ${{ steps.meta.outputs.frontend_image }}:latest-test

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_VPS }}" | base64 -d > ~/.kube/config

      - name: Ensure namespace
        run: kubectl apply -f deploy/k8s/namespaces/hms-dev.yaml

      - name: Create registry pull secret
        run: |
          kubectl -n hms-dev create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username="${{ secrets.GHCR_PULL_USERNAME }}" \
            --docker-password="${{ secrets.GHCR_PULL_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create backend secret
        run: |
          kubectl -n hms-dev create secret generic hms-backend-secrets \
            --from-literal=JWT_SECRET="${{ secrets.HMS_DEV_JWT_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy dev release
        run: |
          helm upgrade --install hms-dev deploy/helm/hms \
            --namespace hms-dev \
            --values deploy/helm/hms/values.yaml \
            --values deploy/helm/hms/values-dev.yaml \
            --set imagePullSecrets[0].name=ghcr-pull-secret \
            --set frontend.image.repository=${{ needs.build-and-push.outputs.frontend_image }} \
            --set frontend.image.tag=dev-${{ needs.build-and-push.outputs.short_sha }} \
            --set backend.image.repository=${{ needs.build-and-push.outputs.backend_image }} \
            --set backend.image.tag=dev-${{ needs.build-and-push.outputs.short_sha }}

      - name: Wait for dev frontend rollout
        run: kubectl -n hms-dev rollout status deployment/hms-dev-frontend --timeout=300s

      - name: Wait for dev backend rollout
        run: kubectl -n hms-dev rollout status deployment/hms-dev-backend --timeout=300s

      - name: Debug dev rollout failure
        if: failure()
        run: |
          echo "=== Deployments ==="
          kubectl -n hms-dev get deployments
          echo "=== ReplicaSets ==="
          kubectl -n hms-dev get rs
          echo "=== Pods ==="
          kubectl -n hms-dev get pods -o wide
          echo "=== Backend describe ==="
          kubectl -n hms-dev describe deployment hms-dev-backend || true
          echo "=== Backend pod describe ==="
          kubectl -n hms-dev describe pod -l app.kubernetes.io/component=backend || true
          echo "=== Backend logs ==="
          kubectl -n hms-dev logs -l app.kubernetes.io/component=backend --all-containers --tail=200 || true
          echo "=== Backend previous logs ==="
          kubectl -n hms-dev logs -p -l app.kubernetes.io/component=backend --all-containers --tail=200 || true

  deploy-test:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - deploy-dev
    environment: test

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_VPS }}" | base64 -d > ~/.kube/config

      - name: Ensure namespace
        run: kubectl apply -f deploy/k8s/namespaces/hms-test.yaml

      - name: Create registry pull secret
        run: |
          kubectl -n hms-test create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username="${{ secrets.GHCR_PULL_USERNAME }}" \
            --docker-password="${{ secrets.GHCR_PULL_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create backend secret
        run: |
          kubectl -n hms-test create secret generic hms-backend-secrets \
            --from-literal=JWT_SECRET="${{ secrets.HMS_TEST_JWT_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy test release
        run: |
          helm upgrade --install hms-test deploy/helm/hms \
            --namespace hms-test \
            --values deploy/helm/hms/values.yaml \
            --values deploy/helm/hms/values-test.yaml \
            --set imagePullSecrets[0].name=ghcr-pull-secret \
            --set frontend.image.repository=${{ needs.build-and-push.outputs.frontend_image }} \
            --set frontend.image.tag=test-${{ needs.build-and-push.outputs.short_sha }} \
            --set backend.image.repository=${{ needs.build-and-push.outputs.backend_image }} \
            --set backend.image.tag=test-${{ needs.build-and-push.outputs.short_sha }}

      - name: Wait for test rollout
        run: |
          kubectl -n hms-test rollout status deployment/hms-test-frontend --timeout=180s
          kubectl -n hms-test rollout status deployment/hms-test-backend --timeout=180s
